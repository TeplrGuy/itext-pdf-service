version: v0.1
testId: itext-pdf-e2e-load
testType: PLAYWRIGHT
displayName: iText PDF Service — Playwright E2E Load Test
description: Run Playwright E2E tests at scale via Azure Load Testing
testPlan: e2e/
engineInstances: 1

autoStop:
  errorPercentage: 80
  timeWindow: 60

env:
  - name: BASE_URL
    value: https://itext-pdf-service-demo.azurewebsites.net
  - name: CI
    value: "true"

failureCriteria:
  - avg(response_time_ms) > 5000
  - percentage(error) > 10
