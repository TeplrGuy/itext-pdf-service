name: Playwright CI & Azure Workspace
on:
  push:
    branches: [main, playwright-testing]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  APP_URL: https://itext-pdf-service-demo2.azurewebsites.net

jobs:
  # ── Stage 1: Build & Unit Test ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: dotnet build --configuration Release

      - name: Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  # ── Stage 2: Playwright E2E (Local) ─────────────────────────────────
  e2e-tests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start application
        run: |
          dotnet run --project src/ITextPdfService &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5087 > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 2
          done
        env:
          ASPNETCORE_URLS: http://localhost:5087

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test --forbid-only
        env:
          BASE_URL: http://localhost:5087
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 14

  # ── Stage 3: Azure Playwright Workspace (Cloud) ─────────────────────
  playwright-workspace:
    name: Playwright Workspace (Azure)
    needs: e2e-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/playwright-testing'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Run Playwright in Azure Workspace
        working-directory: e2e
        run: npx playwright test --config=playwright.service.config.ts --workers=20
        env:
          PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          BASE_URL: ${{ env.APP_URL }}
          CI: true

      - name: Upload cloud test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-cloud-report
          path: e2e/playwright-report/
          retention-days: 14
